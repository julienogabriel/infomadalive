<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; padding: 0; }
        .couverture {
            width: 820px;
            height: 312px;
            background: linear-gradient(135deg, #007A3D 0%, #005a2d 60%, #FC3D32 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .titre {
            font-family: Impact, 'Arial Black', sans-serif;
            font-size: 72px;
            color: white;
            letter-spacing: 5px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        .sous-titre {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 28px;
            color: rgba(255,255,255,0.9);
            margin-top: 15px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="couverture">
        <div class="titre">INFO MADA LIVE</div>
        <div class="sous-titre">Coupures ⚡ Bons plans 🔥 Jobs 💼</div>
    </div>
</body>
</html>
